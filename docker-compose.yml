services:
  mongo:
    image: mongo:8.0
    container_name: code-test-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: backend/ProductsApi/Dockerfile
    container_name: code-test-backend
    restart: unless-stopped
    env_file:
      - backend/ProductsApi/.env
    ports:
      - "8080:8080"
    volumes:
      - backend_data_protection:/var/app/data-protection
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: code-test-frontend
    restart: unless-stopped
    ports:
      - "4173:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  mongo_data:
  backend_data_protection:
